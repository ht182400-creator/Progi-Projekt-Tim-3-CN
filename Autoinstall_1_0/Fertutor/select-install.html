<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fertutor 安装程序</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 16px;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        .option {
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .option:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }
        .option.selected {
            border-color: #667eea;
            background: #f8f7ff;
        }
        .option-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        .option-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .option-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
        .option-features {
            margin-top: 15px;
            text-align: left;
        }
        .option-features li {
            font-size: 13px;
            color: #555;
            margin: 5px 0;
            list-style: none;
        }
        .option-features li::before {
            content: "✓ ";
            color: #667eea;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .progress {
            margin-top: 30px;
            display: none;
        }
        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .status.info {
            background: #e3f2fd;
            color: #1565c0;
        }
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status.error {
            background: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Fertutor 安装程序</h1>
            <p>选择安装方式开始部署</p>
        </div>
        
        <div class="options">
            <div class="option" onclick="selectOption(1)" id="option1">
                <div class="option-icon">💻</div>
                <div class="option-title">虚拟机镜像</div>
                <div class="option-desc">完整的 Windows 11 系统</div>
                <ul class="option-features">
                    <li>预装 Windows 11 Pro</li>
                    <li>已安装 Docker Desktop</li>
                    <li>已配置 Fertutor 项目</li>
                    <li>开机自动启动服务</li>
                    <li>导入 VMware/VirtualBox 即可使用</li>
                </ul>
            </div>
            
            <div class="option" onclick="selectOption(2)" id="option2">
                <div class="option-icon">🐳</div>
                <div class="option-title">Docker 容器</div>
                <div class="option-desc">基于您已有的 Windows 系统</div>
                <ul class="option-features">
                    <li>需要 Windows 11 系统</li>
                    <li>需要已安装 Docker Desktop</li>
                    <li>项目文件已配置好</li>
                    <li>双击自动启动服务</li>
                    <li>适合快速部署</li>
                </ul>
            </div>
        </div>
        
        <button class="btn" id="installBtn" onclick="startInstall()" disabled>开始安装</button>
        
        <div class="progress" id="progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">准备中...</div>
        </div>
        
        <div class="status" id="status"></div>
    </div>
    
    <script>
        let selectedOption = 0;
        
        function selectOption(num) {
            selectedOption = num;
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            document.getElementById('option' + num).classList.add('selected');
            document.getElementById('installBtn').disabled = false;
        }
        
        async function startInstall() {
            if (selectedOption === 0) return;
            
            const btn = document.getElementById('installBtn');
            const progress = document.getElementById('progress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.textContent = '安装中...';
            progress.style.display = 'block';
            
            try {
                if (selectedOption === 1) {
                    // 虚拟机方案 - 运行 Packer
                    progressText.textContent = '检查 Packer 是否已安装...';
                    await runCommand('where packer', true);
                    
                    progressFill.style.width = '20%';
                    progressText.textContent = '开始构建虚拟机镜像（请耐心等待）...';
                    
                    // 检查必要的文件
                    const isoExists = await fileExists('packer/windows.iso');
                    const dockerExists = await fileExists('packer/docker/Docker Desktop Installer.exe');
                    
                    if (!isoExists) {
                        throw new Error('请将 Windows 11 ISO 放入 packer/ 目录');
                    }
                    if (!dockerExists) {
                        throw new Error('请将 Docker Desktop 安装包放入 packer/docker/ 目录');
                    }
                    
                    progressFill.style.width = '50%';
                    progressText.textContent = '正在运行 Packer 构建镜像...';
                    
                    await runCommand('cd packer && packer build windows.packer.json', false);
                    
                    progressFill.style.width = '100%';
                    progressText.textContent = '构建完成！';
                    
                    showStatus('success', '虚拟机镜像已生成在 packer/output/ 目录下，可导入 VMware 或 VirtualBox 使用。');
                } else {
                    // Docker 方案 - 直接运行
                    progressFill.style.width = '30%';
                    progressText.textContent = '检查 Docker 是否已安装...';
                    
                    await runCommand('docker --version', true);
                    
                    progressFill.style.width = '50%';
                    progressText.textContent = '正在启动服务...';
                    
                    await runCommand('docker compose --env-file deploy\\docker.env up -d', false);
                    
                    progressFill.style.width = '100%';
                    progressText.textContent = '启动完成！';
                    
                    showStatus('success', '服务已启动！\n前端: http://localhost:5173\n后端: http://localhost:8080');
                }
                
                btn.textContent = '安装完成';
            } catch (error) {
                showStatus('error', '安装失败: ' + error.message);
                btn.disabled = false;
                btn.textContent = '重试';
            }
        }
        
        async function fileExists(path) {
            try {
                await runCommand('if exist "' + path + '" echo EXISTS', true);
                return true;
            } catch {
                return false;
            }
        }
        
        function runCommand(cmd, silent) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/run-command', true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.onload = function() {
                    if (xhr.status === 200) {
                        resolve(xhr.responseText);
                    } else {
                        reject(new Error(xhr.responseText || 'Command failed'));
                    }
                };
                xhr.onerror = function() {
                    // 浏览器环境无法直接运行命令，使用 PowerShell
                    const exec = new ActiveXObject('WScript.Shell');
                    const result = exec.Exec('cmd /c ' + cmd);
                    if (result.ExitCode === 0) {
                        resolve(result.StdOut.ReadAll());
                    } else {
                        reject(new Error('Command failed: ' + cmd));
                    }
                };
                xhr.send(JSON.stringify({ command: cmd, silent: silent }));
            });
        }
        
        function showStatus(type, message) {
            const status = document.getElementById('status');
            status.className = 'status ' + type;
            status.style.display = 'block';
            status.textContent = message;
        }
    </script>
</body>
</html>
