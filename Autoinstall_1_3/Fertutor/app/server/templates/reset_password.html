<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 | Fertutor.xyz</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 30px auto; background-color: #ffffff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .header { text-align: center; padding-bottom: 20px; border-bottom: 1px solid #004d99; }
        .header h1 { color: #004d99; margin: 0; font-size: 24px; }
        .content { padding: 20px 0; line-height: 1.6; color: #333333; }
        .button-container { text-align: center; margin: 25px 0; }
        .button {
            background-color: #007bff;
            color: white !important;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
        }
        .footer { text-align: center; font-size: 12px; color: #999999; padding-top: 20px; border-top: 1px solid #eeeeee; }
        .important-note { color: #d9534f; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Fertutor.xyz</h1>
    </div>
    <div class="content">
        <h2>欢迎来到 Fertutor！</h2>

        <p>请点击下方按钮确认您的身份并重置密码：</p>

        <div class="button-container">
            <a href="{{resetLink}}" class="button">重置密码</a>
        </div>

        <p>如果按钮无法点击，请将以下链接复制并粘贴到浏览器中：</p>
        <p style="word-break: break-all; font-size: 10px; color: #007bff;">{{resetLink}}</p>

        <p class="important-note">出于安全考虑，此链接将在 10 分钟后失效。如果链接过期，您需要重新申请重置密码。</p>
    </div>
    <div class="footer">
        <p>此邮件为自动发送，请勿回复。</p>
        <p>&copy; 2024 Fertutor.xyz</p>
    </div>
</div>
</body>
</html>
