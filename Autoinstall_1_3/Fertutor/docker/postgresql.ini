; PostgreSQL 无人安装配置
; 此文件用于配置 PostgreSQL 的安装参数

; 超级用户用户名 (数据库超级用户)
superaccount=postgres

; 超级用户密码 (数据库超级用户密码)
superpassword=postgres123

; 服务账户（安装后运行服务的Windows账户）
serviceaccount=postgres

; 服务名称（显示在Windows服务列表中）
servicename=postgresql-x64-16

; 安装目录（默认 C:\Program Files\PostgreSQL\16）
; installpath=

; 数据目录（默认 C:\Program Files\PostgreSQL\16\data）
; datadir=

; 端口（默认 5432）
port=5432
